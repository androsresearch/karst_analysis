# config/pipeline_default.yml
# Canonical default parameters for the karst_analysis pipeline.
#
# DO NOT EDIT THIS FILE. It is the frozen baseline used to fill missing
# keys in user configs. Cite this file in the thesis as the reference
# for default parameter values.
#
# To run the pipeline with custom parameters, create a NEW YAML file
# (e.g. config/pipeline.yml or config/sensitivity_window21.yml) that
# overrides only the keys you care about, and pass it via:
#
#     uv run python scripts/preprocess_batch.py --config config/sensitivity_window21.yml
#
# Missing keys in the user config fall back to the values defined here.

# ─────────────────────────────────────────────────────────────────────
# Campaign (folder under data/raw/sec/<campaign>/, etc.)
# ─────────────────────────────────────────────────────────────────────
campaign: "2022_02"

# ─────────────────────────────────────────────────────────────────────
# Preprocessing — cleaning + smoothing of raw YSI profiles
# ─────────────────────────────────────────────────────────────────────
preprocessing:
  # Methods to run; one or both of: savgol, lowess
  methods: ["savgol", "lowess"]

  # ── Cleaning steps (applied to BOTH methods, before smoothing) ──
  apply_depth_adjustment: false
  depth_adjustment: 0.272                 # metres
  depth_adjustment_method: "TOM"          # "TOM" or "YSI"
  apply_monotonic_descent_filter: true
  monotonic_descent_tolerance: 0.002      # metres
  dz: null                                # null = derive from data via dz_method
  dz_method: "percentile95"               # "percentile95" or fixed float
  apply_log10: true                       # work in log10(SEC) space

  # ── Savitzky-Golay parameters (Savitzky & Golay 1964) ──
  # Variant: "segmented" (custom; preserves gradient discontinuities)
  savgol:
    window: 11                            # filter window (odd integer)
    order: 3                              # polynomial order (< window)
    segmented: true                       # use the segmented variant
    gradient_factor: 20.0                 # discontinuity = max(median*factor, threshold)
    min_gradient_threshold: 1000.0        # absolute floor (µS/cm)

  # ── LOWESS parameters (Cleveland 1979) + PAVA (custom post-process) ──
  lowess:
    frac: 0.05                            # fraction of points per local fit
    degree: 1                             # local polynomial order (1=linear)
    n_robust_iter: 2                      # bisquare IRLS passes
    apply_pava: true                      # enforce monotonic SEC after LOWESS

# ─────────────────────────────────────────────────────────────────────
# Breakpoints — piecewise_regression BIC sweep
# ─────────────────────────────────────────────────────────────────────
breakpoints:
  max_breakpoints: 15                     # sweep N = 1..max
  n_trials: 3                             # multi-trial for stability
  tolerance: 1.0e-5                       # convergence tolerance
  min_distance: 0.01                      # min distance between BPs (data units)
  use_log10: true                         # detect on log10(SEC) (must match preprocessing)

# ─────────────────────────────────────────────────────────────────────
# Robustness — pooling + clustering for stability scoring
# ─────────────────────────────────────────────────────────────────────
robustness:
  delta_m: 0.5                            # single-linkage threshold (m)
  sensitivity_deltas_m: [0.3, 0.5, 1.0]   # δ values for sensitivity scan
  n_min: 1                                # lowest N to pool
  n_max: 15                               # highest N to pool
  smoothings: ["savgol", "lowess"]        # methods to pool

# ─────────────────────────────────────────────────────────────────────
# ERT — 1D resistivity profile analysis
# ─────────────────────────────────────────────────────────────────────
# Mirrors the structure in pipeline_default.yml. Override values here
# only (the rest fall back to pipeline_default.yml).
ert:
  breakpoints:
    max_breakpoints: 15
    tolerance: 1.0e-5
    min_distance: 0.01
    start_seed: 0
    max_seed_attempts: 20

  # PROVISIONAL — see pipeline_default.yml for context.
  bot_mz_rho_threshold: 25.0
