# config/pipeline_default.yml
# Canonical default parameters for the karst_analysis pipeline.
#
# DO NOT EDIT THIS FILE. It is the frozen baseline used to fill missing
# keys in user configs. 
# To run the pipeline with custom parameters, create a NEW YAML file
# (e.g. config/pipeline.yml or config/sensitivity_window21.yml) that
# overrides only the keys you care about, and pass it via:
#
#     uv run python scripts/preprocess_batch.py --config config/sensitivity_window21.yml
#
# Missing keys in the user config fall back to the values defined here.

# ─────────────────────────────────────────────────────────────────────
# Campaign (folder under data/raw/sec/<campaign>/, etc.)
# ─────────────────────────────────────────────────────────────────────
campaign: "2022_02"

# ─────────────────────────────────────────────────────────────────────
# Preprocessing — cleaning + smoothing of raw YSI profiles
# ─────────────────────────────────────────────────────────────────────
preprocessing:
  # Methods to run; one or both of: savgol, lowess
  methods: ["savgol", "lowess"]

  # ── Cleaning steps (applied to BOTH methods, before smoothing) ──
  apply_depth_adjustment: false
  depth_adjustment: 0.272                 # metres
  depth_adjustment_method: "TOM"          # "TOM" or "YSI"
  apply_monotonic_descent_filter: true
  monotonic_descent_tolerance: 0.002      # metres
  dz: null                                # null = derive from data via dz_method
  dz_method: "percentile95"               # "percentile95" or fixed float
  apply_log10: true                       # work in log10(SEC) space

  # ── Savitzky-Golay parameters (Savitzky & Golay 1964) ──
  # Variant: "segmented" (custom; preserves gradient discontinuities)
  savgol:
    window: 11                            # filter window (odd integer)
    order: 3                              # polynomial order (< window)
    segmented: true                       # use the segmented variant
    gradient_factor: 20.0                 # discontinuity = max(median*factor, threshold)
    min_gradient_threshold: 1000.0        # absolute floor (µS/cm)

  # ── LOWESS parameters (Cleveland 1979) + PAVA (custom post-process) ──
  lowess:
    frac: 0.05                            # fraction of points per local fit
    degree: 1                             # local polynomial order (1=linear)
    n_robust_iter: 2                      # bisquare IRLS passes
    apply_pava: true                      # enforce monotonic SEC after LOWESS

# ─────────────────────────────────────────────────────────────────────
# Breakpoints — piecewise_regression BIC sweep
# ─────────────────────────────────────────────────────────────────────
breakpoints:
  max_breakpoints: 10                     # sweep N = 1..max
  n_trials: 3                             # multi-trial for stability
  tolerance: 1.0e-5                       # convergence tolerance
  min_distance: 0.01                      # min distance between BPs (data units)
  use_log10: true                         # detect on log10(SEC) (must match preprocessing)

# ─────────────────────────────────────────────────────────────────────
# Robustness — pooling + clustering for stability scoring
# ─────────────────────────────────────────────────────────────────────
robustness:
  delta_m: 0.5                            # single-linkage threshold (m)
  sensitivity_deltas_m: [0.3, 0.5, 1.0]   # δ values for sensitivity scan
  n_min: 1                                # lowest N to pool
  n_max: 10                               # highest N to pool
  smoothings: ["savgol", "lowess"]        # methods to pool

# ─────────────────────────────────────────────────────────────────────
# Convergence — multi-technique integration
# ─────────────────────────────────────────────────────────────────────
convergence:

  # SEC ↔ caliper quantitative convergence (Idea 3).
  # Matches each robust SEC cluster against the anomalous caliper zones
  # of the same well, scores convergence per cluster, and aggregates
  # per well.
  sec_caliper:

    # ── Input filtering ──
    # Minimum SEC robustness agreement (0–10) for a cluster to enter
    # the analysis. agreement = min(n_savgol, n_lowess); 3 filters out
    # clusters seen by fewer than 3 of the 10 N values pooled.
    sec_agreement_min: 3

    # Caliper severity filter. null = keep all zones. To exclude mild
    # zones (which are often instrument noise) set to ["moderate","severe"].
    caliper_severity_filter: null

    # ── Matching rule ──
    # How a cluster–zone pair counts as a match.
    #   "overlap_only"          → match iff overlap_m > 0
    #   "center_distance_only"  → match iff |centre - centre| <= tolerance_m
    #   "hybrid"                → match iff EITHER of the above (recommended)
    matching_rule: "hybrid"

    # Centre-to-centre tolerance (m). Used by hybrid and center_distance_only.
    # 0.5 m mirrors the SEC robustness clustering threshold (δ).
    tolerance_m: 0.5

    # ── Best-match selection (when one cluster matches several zones) ──
    # Strategy to populate the best_match_* columns. The full list of
    # matches is always preserved in n_caliper_zones_matched and
    # all_matched_severities so no information is lost.
    #   "overlap_then_distance" → max overlap_m; tie-break: min centre dist
    #   "max_severity"           → most severe zone; tie-break: max overlap
    #   "max_peak_excess"        → max peak_excess_cm; tie-break: max overlap
    best_match_priority: "overlap_then_distance"

    # ── Scoring ──
    # convergence_score = agreement_SEC × max( severity_weights[s] for s in matched zones ).
    # If no zones match, severity_weight_max = 0 and convergence_score = 0.
    severity_weights:
      mild: 1
      moderate: 2
      severe: 3

    # ── Unmatched-zones report ──
    # Caliper anomalous zones with NO matching SEC cluster are written
    # to a separate CSV. This filter controls which severities appear there;
    # set to null to include all, or "moderate" to drop mild noise.
    unmatched_zones_min_severity: "moderate"

    # ── Run tag ──
    # Embedded in the runs.csv ledger entry and in the output filenames.
    # Bump this when you make a methodological change worth versioning.
    run_tag: "convergence_sec_caliper_v1"

# ────────────────────────────────────────────────────────────────────
# v10 / v11 — SEC raw × caliper panel (visualisation only, no computation)
# ────────────────────────────────────────────────────────────────────
# This block parameterises ``scripts/sec_caliper_panels.py`` and
# the underlying ``karst_analysis.convergence.sec_caliper_panel``
# module. It produces one PNG per priority well plus a master 1×N
# figure where every well is a column with the same depth axis.
#
# v11 introduces multi-campaign overlay: instead of plotting one
# campaign per panel, several campaigns can be overlaid on the same
# SEC axis to study seasonal/annual variability of the freshwater–
# saltwater transition. Each campaign uses a single colour from the
# Plotly Dark24 palette.
sec_caliper_panel:
  # Field campaigns whose raw SEC traces are overlaid on the right
  # column. Pass a one-element list to reproduce v10 behaviour.
  # Each campaign is a folder under ``data/raw/sec/<campaign>/<type>/``.
  campaigns: ["2022_02"]

  # SEC x-axis scale. Linear by default — in this aquifer the dynamic
  # range (~500 to ~50,000 µS/cm) is large but still readable on a
  # linear scale, and the transition shape from fresh to saline water
  # is more visually informative than on log. Set to true if needed.
  sec_log_x: false

  # Visual styling of the SEC traces.
  sec_alpha: 0.75
  sec_lw: 0.7

  # Column widths inside each well group: (caliper_width, sec_width).
  # The caliper column is narrower because the data lives in a small
  # range around the auger nominal; the SEC column needs more room.
  width_ratios: [1.0, 1.4]

  # Whether to also render the master 1×N figure. Each well becomes
  # one column-pair; depth axis is shared across all wells.
  build_master: true

  # Saturation reference line on the caliper axis (cm).
  sat_cm: 32.5

  # Campaign-to-colour mapping override. Leave empty (commented out) to
  # use the default Dark24 palette assigned in the order campaigns
  # appear above. Set explicitly if you want stable colours across
  # plots where the campaign list changes (so e.g. 2022_02 is always
  # blue and 2023_06 is always pink).
  # campaign_palette:
  #   "2022_02": "#2E91E5"
  #   "2022_06": "#E15F99"
  #   "2023_02": "#1CA71C"

  # Suffix appended to legend labels when a campaign's vadose value
  # came from the fallback campaign (because the requested
  # (well, campaign) had no explicit row in wells.csv and the raw CSV
  # lacked the Depth-from-GL column). Default: " *".
  fallback_marker: " *"


# v12 — SEC raw × caliper panel grouped by SITE (visualisation only)
# ────────────────────────────────────────────────────────────────────
# Parameterises ``scripts/site_panels.py`` and the underlying
# ``karst_analysis.convergence.site_panel`` module.
#
# v12 introduces a SITE-based view: one panel per priority site (AW5,
# AW6, BW3, LRS69, LRS70). Each panel has two columns:
#   - caliper (D-well only — only D wells were calipered)
#   - SEC: ALL the site's wells (D, O, S) overlaid, across ALL the
#          requested campaigns. Distinguished by:
#                colour     = campaign (fixed thesis palette below)
#                line-style = well type (D solid, O dotted, S dashed)
#
# v11's "one panel per well" view (``sec_caliper_panel``) is preserved
# unchanged; the two views coexist and are complementary.
site_panel:
  # The six official campaigns of the thesis. Keep the list closed so
  # the colour mapping below is exhaustive.
  campaigns:
    - "2011_05"
    - "2022_02"
    - "2022_08"
    - "2023_08"
    - "2025_02"
    - "2025_11"

  # Well types to overlay on the SEC axis. Set to ["D"] for a v11-like
  # restriction to deep wells only.
  well_types: ["D", "O", "S"]

  # Default sites: empty list means "all priority sites" (auto-derived
  # from the WELLS table in caliper_video.py). Set explicitly to
  # restrict to a subset.
  sites: []

  # SEC axis on log scale by default — coastal-aquifer SEC spans ~3
  # decades and a linear axis crushes the freshwater portion.
  sec_log_x: true

  # Render-time floor on the SEC values plotted. Filters out
  # instrumental in-air readings (~1-50 µS/cm) at the start of YSI
  # casts. The underlying RawYsiTrace.df is NOT modified. Set to 0.0
  # to disable.
  sec_min_uS_cm: 200.0

  # Visual styling.
  sec_alpha: 0.7
  sec_lw: 1.0

  # Column widths within a single site panel: (caliper, sec). The SEC
  # column is wider (~4× the caliper column) because it overlays many
  # traces.
  width_ratios: [1.0, 4.2]

  # Whether to also render the master 1×N figure with all sites.
  build_master: true

  # Saturation reference line on the caliper axis (cm).
  sat_cm: 32.5

  # Stable, project-wide campaign-to-colour mapping. Keep these fixed
  # across the thesis so the same campaign reads as the same colour in
  # every panel of every chapter.
  campaign_palette:
    "2011_05": "#7f7f7f"   # grey   — historical context
    "2022_02": "#1f77b4"   # blue
    "2022_08": "#2ca02c"   # green
    "2023_08": "#ff7f0e"   # orange
    "2025_02": "#9467bd"   # purple
    "2025_11": "#000000"   # black

  # Linestyle convention by well type. Don't change without good
  # reason — the project's narrative ("D is primary") relies on it.
  well_type_linestyle:
    "D": "-"
    "O": ":"
    "S": "--"

  # Suffix appended to legend labels when a campaign's vadose value
  # came from the fallback campaign. Default: " *". Note: in v12 a
  # fallback can have two distinct causes — (a) no explicit row in
  # wells.csv AND no GL column in the CSV, or (b) the CSV uses
  # 'Depth m' instead of 'Vertical Position m' (e.g. 2025_11). The
  # legend uses a single asterisk for both cases; the README explains
  # the methodological distinction.
  fallback_marker: " *"


# ─────────────────────────────────────────────────────────────────────
# ERT — 1D resistivity profile analysis
# ─────────────────────────────────────────────────────────────────────
# Parameterises the ERT pipeline (src/karst_analysis/ert/). Breakpoint
# detection mirrors the SEC pipeline (BIC sweep + multi-trial), with
# one ERT-specific addition: deterministic seed discovery for
# reproducible converged fits (see NOTES_open_questions.md, entries 4
# and 5b for the rationale).
ert:
  # ── Breakpoint detection ─────────────────────────────────────────
  breakpoints:
    max_breakpoints: 15                   # sweep N = 1..max  (matches SEC)
    tolerance: 1.0e-5                     # convergence tolerance
    min_distance: 0.01                    # min distance between BPs (data units)

    # Seed discovery — try seeds [start_seed, start_seed+max_seed_attempts)
    # until pw.Fit converges. The successful seed is recorded alongside
    # the breakpoints for reproducibility. See NOTES #4, #5, #5b.
    start_seed: 0
    max_seed_attempts: 20

  # ── Mixing-zone identification ───────────────────────────────────
  # PROVISIONAL placeholder. Awaiting Mariana's final scientific
  # decision on the resistivity threshold below which a breakpoint
  # is considered to sit in the saltwater regime. ERT thresholds are
  # site- and inversion-dependent, so this number is likely to change.
  bot_mz_rho_threshold: 25.0              # Ω·m, BPs with rho <= this are eligible for BOT MZ

